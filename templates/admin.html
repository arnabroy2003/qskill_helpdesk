<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QSkill Admin | Support Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .user-card.active { background-color: #f5f3ff; border-right: 4px solid #7c3aed; }
        .chat-gradient { background: radial-gradient(circle at top right, #f5f3ff 0%, #ffffff 100%); }
        #admin-chat-box::-webkit-scrollbar { width: 4px; }
        #admin-chat-box::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .message-anim { animation: slideIn 0.2s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Mobile height fix */
        .h-screen-safe { height: 100vh; height: 100dvh; }
    </style>
</head>
<body class="h-screen-safe flex overflow-hidden text-slate-900">

    <aside id="sidebar" class="w-full md:w-80 lg:w-96 bg-white border-r border-slate-200 flex flex-col z-20 shadow-xl transition-all duration-300">
        <div class="p-4 md:p-6 border-b border-slate-100 flex items-center justify-between bg-white sticky top-0">
            <h1 class="text-xl font-bold tracking-tight text-slate-800">Inbound <span class="text-purple-600">Chats</span></h1>
            <span class="bg-purple-100 text-purple-700 text-xs font-bold px-2.5 py-1 rounded-full">{{ users|length }}</span>
        </div>
        
        <div class="overflow-y-auto flex-1">
            {% for user in users %}
            <div onclick="handleUserClick(this, '{{ user.id }}', '{{ user.name }}')" 
                 class="user-card p-4 md:p-5 border-b border-slate-50 hover:bg-slate-50 cursor-pointer transition-all duration-200 group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-500 group-hover:bg-purple-100 group-hover:text-purple-600 transition-colors">
                        {{ user.name[:1] }}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-semibold text-slate-800 truncate text-sm md:text-base">{{ user.name }}</p>
                        <p class="text-xs text-slate-400 truncate mt-0.5">{{ user.email }}</p>
                    </div>
                    <div class="w-2 h-2 rounded-full bg-green-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </div>
            </div>
            {% endfor %}
        </div>
    </aside>

    <main id="main-content" class="fixed inset-0 md:relative md:flex-1 flex flex-col z-30 translate-x-full md:translate-x-0 transition-transform duration-300 bg-white md:bg-transparent">
        
        <div id="empty-state" class="hidden md:flex absolute inset-0 z-10 flex-col items-center justify-center bg-slate-50 text-slate-400 p-8 text-center">
            <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </div>
            <h3 class="text-slate-600 font-semibold text-lg">Select a conversation</h3>
            <p class="max-w-xs text-sm mt-1">Pick a student from the left to start.</p>
        </div>

        <div id="chat-container" class="hidden flex-1 flex flex-col h-full relative z-20 chat-gradient">
            <header class="p-4 md:p-5 bg-white border-b border-slate-200 flex items-center gap-3 shadow-sm">
                <button onclick="closeChatMobile()" class="md:hidden p-2 -ml-2 text-slate-600 hover:bg-slate-100 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                        <h2 class="font-bold text-slate-800 truncate">Chat: <span id="active-user-name" class="text-purple-600"></span></h2>
                    </div>
                </div>
            </header>

            <div id="admin-chat-box" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
                </div>

            <div class="p-4 md:p-6 bg-white border-t border-slate-200">
                <div class="max-w-4xl mx-auto flex items-center gap-2 bg-slate-50 border border-slate-200 p-1 rounded-2xl focus-within:ring-2 focus-within:ring-purple-500/20 focus-within:border-purple-500 transition-all">
                    <input id="admin-input" 
                           type="text" 
                           class="flex-1 bg-transparent border-none focus:ring-0 px-3 md:px-4 py-2 text-sm md:text-base text-slate-700 placeholder:text-slate-400" 
                           placeholder="Type a reply...">
                    
                    <button onclick="sendAdminReply()" 
                            class="bg-purple-600 text-white p-2.5 md:px-6 md:py-2.5 rounded-xl font-bold hover:bg-purple-700 transform transition-all active:scale-95 shadow-lg shadow-purple-200">
                        <span class="hidden md:block">Send Reply</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 md:hidden" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        let currentRoom = null;

        // NEW: Mobile-Specific Nav Logic
        function handleUserClick(element, userId, userName) {
            openChat(element, userId, userName);
            if (window.innerWidth < 768) {
                document.getElementById('main-content').classList.remove('translate-x-full');
            }
        }

        function closeChatMobile() {
            document.getElementById('main-content').classList.add('translate-x-full');
        }

        async function openChat(element, userId, userName) {
            document.querySelectorAll('.user-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');

            currentRoom = userId;
            document.getElementById('chat-container').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('active-user-name').innerText = userName;
            
            const chatBox = document.getElementById('admin-chat-box');
            chatBox.innerHTML = `<div class="flex justify-center p-10"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-purple-600"></div></div>`;
            
            socket.emit('join', { room: userId });

            try {
                const response = await fetch(`/api/messages/${userId}`);
                const messages = await response.json();
                chatBox.innerHTML = ''; 
                messages.forEach(msg => renderMessage(msg.message, msg.sender));
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML = '<p class="text-center text-red-500 py-10">Error loading messages.</p>';
            }
        }

        function renderMessage(text, sender) {
            const chatBox = document.getElementById('admin-chat-box');
            const isMe = sender === 'admin';
            const containerClass = isMe ? 'justify-end' : 'justify-start';
            const bubbleClass = isMe ? 'bg-purple-600 text-white rounded-2xl rounded-tr-none' : 'bg-slate-100 text-slate-700 rounded-2xl rounded-tl-none';

            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${containerClass} message-anim mb-4`;
            messageDiv.innerHTML = `
                <div class="${bubbleClass} p-3 md:p-4 max-w-[85%] md:max-w-md shadow-sm">
                    <p class="text-sm md:text-base leading-relaxed">${text}</p>
                </div>`;
            
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendAdminReply() {
            const input = document.getElementById('admin-input');
            if(input.value.trim() && currentRoom) {
                socket.emit('send_message', { room: currentRoom, message: input.value });
                input.value = '';
            }
        }

        socket.on('receive_message', (data) => {
            renderMessage(data.message, data.sender);
        });

        document.getElementById('admin-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendAdminReply();
        });
    </script>
</body>
</html>
