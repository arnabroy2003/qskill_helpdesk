<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QSkill | Admin Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
        }
        .admin-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.5);
        }
        .admin-input {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .admin-input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
            background: rgba(15, 23, 42, 1);
        }
        /* Subtle scanline effect for that 'Security Monitor' vibe */
        .admin-card::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="absolute w-[500px] h-[500px] bg-purple-600/10 blur-[120px] rounded-full"></div>

    <div class="admin-card relative w-full max-w-md rounded-[2.5rem] p-10 md:p-14 overflow-hidden">
        
        <div class="relative z-20 text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-slate-900 border border-white/10 shadow-inner mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-white tracking-tight mb-2">Secure Login</h2>
            <p class="text-slate-400 text-sm font-medium tracking-wide uppercase">Administrative Access Only</p>
        </div>

        <form action="/admin-login" method="POST" class="relative z-20 space-y-5">
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-500 ml-1 uppercase tracking-widest">Operator ID</label>
                <input type="text" 
                       name="username" 
                       placeholder="Username" 
                       required
                       class="admin-input w-full p-4 rounded-2xl text-white outline-none placeholder:text-slate-700">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-500 ml-1 uppercase tracking-widest">Access Key</label>
                <input type="password" 
                       name="password" 
                       placeholder="••••••••" 
                       required
                       class="admin-input w-full p-4 rounded-2xl text-white outline-none placeholder:text-slate-700">
            </div>

            <div class="pt-4">
                <button class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-4 rounded-2xl font-bold tracking-wide shadow-lg shadow-purple-900/20 hover:shadow-purple-500/40 transform transition-all duration-300 active:scale-[0.97] hover:-translate-y-1">
                    Authorize Access
                </button>
            </div>
        </form>

        <div class="relative z-20 flex items-center justify-center gap-2 mt-10">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[10px] text-slate-500 uppercase font-bold tracking-[0.2em]">Security Protocol v4.0 Active</span>
        </div>

    </div>

</body>
</html>
