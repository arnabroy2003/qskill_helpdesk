<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QSkill Support | Premium Help Desk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                        radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                        radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-color: #0f172a;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #a855f7;
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.15);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-w-[440px] rounded-[2.5rem] p-8 md:p-12 relative overflow-hidden">
        
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-purple-600/20 blur-[80px] rounded-full"></div>
        
        <div class="text-center relative z-10 mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 mb-6 rounded-2xl bg-gradient-to-tr from-purple-600 to-blue-500 shadow-lg shadow-purple-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white mb-2">QSkill <span class="text-purple-400">Desk</span></h1>
            <p class="text-slate-400 font-medium">Experience next-level support</p>
        </div>

        <form action="/login" method="POST" class="space-y-6 relative z-10">
            <div class="group">
                <label class="block text-xs font-semibold uppercase tracking-widest text-slate-500 mb-2 ml-1">Full Name</label>
                <input type="text" 
                       name="name" 
                       required 
                       placeholder="John Doe"
                       class="input-field w-full p-4 rounded-2xl text-white outline-none placeholder:text-slate-600">
            </div>

            <div class="group">
                <label class="block text-xs font-semibold uppercase tracking-widest text-slate-500 mb-2 ml-1">Email Address</label>
                <input type="email" 
                       name="email" 
                       required 
                       placeholder="hello@qskill.com"
                       class="input-field w-full p-4 rounded-2xl text-white outline-none placeholder:text-slate-600">
            </div>

            <button type="submit" 
                    class="w-full bg-white text-slate-950 font-bold py-4 rounded-2xl hover:bg-purple-50 transform transition-all duration-200 active:scale-[0.98] shadow-xl shadow-white/5 flex items-center justify-center gap-2 mt-4">
                Start Chatting
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </button>
        </form>

        <p class="text-center text-slate-500 text-xs mt-8 relative z-10 tracking-wide">
            Secure & Encrypted Connection
        </p>
    </div>

</body>
</html>
