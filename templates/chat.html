<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QSkill Support | Live Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.15), transparent),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent);
        }

        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .glass-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* RIGHT SIDE: Current User (Student) */
        .chat-bubble-user {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
            border-bottom-right-radius: 4px !important;
        }

        /* LEFT SIDE: Agent (Admin) */
        .chat-bubble-agent {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px !important;
        }

        .input-area {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            /* Fix for iOS bottom bar */
            padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col overflow-hidden">

    <header class="glass-header sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="relative">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-500 to-blue-500 flex items-center justify-center text-white font-bold text-sm shadow-lg">QS</div>
                <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#0f172a] rounded-full"></span>
            </div>
            <div>
                <h1 class="text-white font-semibold tracking-tight">QSkill Support</h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Priority Agent Online</p>
            </div>
        </div>
    </header>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
        {% for msg in history %}
            {# Swap 'student' and 'admin' here if the alignment is reversed #}
            <div class="flex {{ 'justify-end' if msg.sender == 'student' else 'justify-start' }} animate-fade-in">
                <div class="{{ 'chat-bubble-user text-white' if msg.sender == 'student' else 'chat-bubble-agent text-slate-200' }} px-5 py-3 rounded-[22px] max-w-[85%] md:max-w-md text-sm leading-relaxed shadow-lg">
                    {{ msg.message }}
                    <div class="text-[10px] opacity-50 mt-1 {{ 'text-right' if msg.sender == 'student' else 'text-left' }}">
                        Sent
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>

    <div class="input-area px-4 pt-4">
        <div class="max-w-4xl mx-auto flex items-center gap-3 bg-slate-800/50 p-1.5 rounded-[28px] border border-white/10 focus-within:border-purple-500/50 transition-all shadow-2xl">
            <button class="p-2 ml-1 text-slate-400 hover:text-purple-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </button>
            
            <input id="message-input" 
                   type="text" 
                   autocomplete="off"
                   class="flex-1 bg-transparent text-white border-none focus:ring-0 px-1 py-3 text-base placeholder:text-slate-500" 
                   placeholder="Message..."
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            
            <button onclick="sendMessage()" 
                    class="bg-white text-slate-900 h-11 w-11 flex items-center justify-center rounded-full hover:bg-purple-500 hover:text-white transition-all transform active:scale-90 shadow-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 rotate-90" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
    const socket = io();
    const room = "{{ session['user_id'] }}";
    const role = "{{ session['role'] }}"; // Get role from Flask

    // Join the room immediately on load
    socket.emit('join', { room: room });

    function sendMessage() {
        const input = document.getElementById('message-input');
        const val = input.value.trim();
        if(val) {
            // FIX: We rely on the server-side session for the role, 
            // but we send the room and message here.
            socket.emit('send_message', {
                room: room, 
                message: val
                // No need to send 'sender' here if you use the session fix above
            });
            input.value = '';
        }
    }

    socket.on('receive_message', (data) => {
        const chatBox = document.getElementById('chat-box');
        
        // FIX: Logic check
        // If I am a student, and the message 'sender' is student -> Right Side
        // If I am a student, and the message 'sender' is admin -> Left Side
        const isStudent = data.sender === 'student';
        const side = isStudent ? 'justify-end' : 'justify-start';
        const bubbleClass = isStudent ? 'chat-bubble-user text-white' : 'chat-bubble-agent text-slate-200';
        
        const messageHtml = `
            <div class="flex ${side} animate-fade-in mb-4">
                <div class="${bubbleClass} px-5 py-3 rounded-[22px] max-w-[85%] md:max-w-md text-sm leading-relaxed shadow-lg">
                    ${data.message}
                    <div class="text-[10px] opacity-50 mt-1 ${isStudent ? 'text-right' : 'text-left'}">
                        Just now
                    </div>
                </div>
            </div>`;
        
        chatBox.insertAdjacentHTML('beforeend', messageHtml);
        
        setTimeout(() => {
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }, 50);
    });

    // Handle window resize for mobile keyboard
    window.addEventListener('resize', () => {
        const chatBox = document.getElementById('chat-box');
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>
</body>
</html>
